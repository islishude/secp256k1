name: benchmark

on:
  push:
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

defaults:
  run:
    working-directory: ./benchmark

jobs:
  benchmark:
    strategy:
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-26
          - windows-2025-vs2026
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
          check-latest: true
      - run: go test -bench=. -benchmem -count=5
