name: amd64-asm

on:
  push:
    branches:
      - "codex/amd64-avo-asm"
      - "codex/amd64-avo-asm-v2"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
          check-latest: true
          cache-dependency-path: |
            go.mod
            asm/go.sum
            benchmark/go.mod
      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
      - name: Verify root module and source
        run: |
          set -euo pipefail
          go build ./...
          gofmt -d .
          test -z "$(gofmt -l .)"
          go vet ./...
          go fix -diff ./...
          go mod tidy -diff
          make check-main-deps vartime-audit
      - name: Test default backend
        run: go test -v -race -count=1 -cover ./...
      - name: Fuzz default sign, verify, and recovery path
        run: go test -run '^$' -fuzz=FuzzSignVerifyRecoverDigest -fuzztime=10s .
      - name: Verify benchmark module
        working-directory: ./benchmark
        run: |
          set -euo pipefail
          go build ./...
          gofmt -d .
          test -z "$(gofmt -l .)"
          go vet ./...
          go fix -diff ./...
          go mod tidy -diff
          go test -race -count=1 .

  correctness:
    strategy:
      matrix:
        goamd64:
          - v1
          - v3
    runs-on: ubuntu-24.04
    env:
      GOAMD64: ${{ matrix.goamd64 }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
          check-latest: true
          cache-dependency-path: |
            go.mod
            asm/go.sum
      - name: Verify generator module
        run: make check-asm-module
      - name: Verify generated files
        run: make generate-check
      - name: Build and vet tagged AMD64 backend
        run: |
          go build -tags=secp256k1_asm ./...
          go vet -tags=secp256k1_asm ./...
      - name: Test tagged AMD64 backend
        run: go test -v -race -count=1 -tags=secp256k1_asm ./...
      - name: Fuzz tagged base-field arithmetic
        run: go test -tags=secp256k1_asm -run '^$' -fuzz=FuzzElementArithmetic -fuzztime=10s ./internal/field
      - name: Constant-time smoke
        env:
          SECP256K1_CT_TEST: "1"
        run: go test -count=1 -tags=secp256k1_asm -run TestConstantTimeScalarBaseMultSmoke .
      - name: Disassemble and audit kernels
        run: ./scripts/check-amd64-asm.sh "${RUNNER_TEMP}/amd64-audit"
      - name: Upload disassembly
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: amd64-${{ matrix.goamd64 }}-disassembly
          path: ${{ runner.temp }}/amd64-audit

  native-windows:
    strategy:
      matrix:
        goamd64:
          - v1
          - v3
    runs-on: windows-2025-vs2026
    env:
      GOAMD64: ${{ matrix.goamd64 }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
          check-latest: true
      - run: go build -tags=secp256k1_asm ./...
      - run: go vet -tags=secp256k1_asm ./...
      - run: go test -race -count=1 -tags=secp256k1_asm ./...

  cross-build-darwin:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
          check-latest: true
      - name: Cross-build Darwin AMD64 v1
        env:
          GOOS: darwin
          GOARCH: amd64
          GOAMD64: v1
        run: go build -tags=secp256k1_asm ./...
      - name: Cross-build Darwin AMD64 v3
        env:
          GOOS: darwin
          GOARCH: amd64
          GOAMD64: v3
        run: go build -tags=secp256k1_asm ./...

  performance:
    strategy:
      fail-fast: false
      matrix:
        goamd64:
          - v1
          - v3
    runs-on: ubuntu-24.04
    env:
      GOAMD64: ${{ matrix.goamd64 }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
          check-latest: true
      - name: Record runner and feature state
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/amd64-bench"
          lscpu >"${RUNNER_TEMP}/amd64-bench/lscpu.txt"
          taskset -pc $$ >"${RUNNER_TEMP}/amd64-bench/affinity.txt"
          go env >"${RUNNER_TEMP}/amd64-bench/go-env.txt"
          go test -v -count=1 -tags=secp256k1_asm -run TestAMD64FeatureDispatch ./internal/field \
            | tee "${RUNNER_TEMP}/amd64-bench/cpuid.txt"
          grep -q 'CPUID ADX+BMI2=true' "${RUNNER_TEMP}/amd64-bench/cpuid.txt"
          for kernel in none mul square; do
            SECP256K1_AMD64_BENCH_KERNEL="${kernel}" \
              go test -count=1 -tags='secp256k1_asm,secp256k1_amd64_bench' \
                -run '^TestAMD64BenchmarkKernelSelection$' ./internal/field
          done
      - name: Interleave default and tagged benchmarks
        run: |
          set -euo pipefail
          output="${RUNNER_TEMP}/amd64-bench"
          for package in root field scalar; do
            : >"${output}/${package}-default.txt"
            : >"${output}/${package}-tagged.txt"
          done
          for kernel in none mul square; do
            : >"${output}/root-${kernel}.txt"
          done
          : >"${output}/root-w5.txt"

          run_mode() {
            local mode="$1"
            local tags=()
            if [[ "${mode}" == tagged ]]; then
              tags=(-tags=secp256k1_asm)
            fi
            GOMAXPROCS=1 taskset -c 0 go test "${tags[@]}" -run '^$' \
              -bench '^Benchmark(SignDigest|SignRecoverableDigest|VerifyDigest|RecoverDigest|VerifyHotPublicKey|VerifyParseCompressedCold|VerifyParseUncompressedCold|SignCompact|SignRecoverable|PublicKeyDerive|ScalarInv|ScalarInvVartime|ScalarBaseMultProjective)$' \
              -benchmem -benchtime=500ms -count=1 . >>"${output}/root-${mode}.txt"
            GOMAXPROCS=1 taskset -c 0 go test "${tags[@]}" -run '^$' \
              -bench '^BenchmarkField(Add|Sub|Mul|MulByB3|Square|SquareN)$' \
              -benchmem -benchtime=500ms -count=1 ./internal/field >>"${output}/field-${mode}.txt"
            GOMAXPROCS=1 taskset -c 0 go test "${tags[@]}" -run '^$' \
              -bench '^BenchmarkScalar(Mul|Square|SquareN|Inv)$' \
              -benchmem -benchtime=500ms -count=1 ./internal/scalar >>"${output}/scalar-${mode}.txt"
          }

          run_kernel() {
            local kernel="$1"
            SECP256K1_AMD64_BENCH_KERNEL="${kernel}" \
              GOMAXPROCS=1 taskset -c 0 go test -tags='secp256k1_asm,secp256k1_amd64_bench,secp256k1_amd64_w5_bench' -run '^$' \
                -bench '^Benchmark(SignRecoverable|VerifyHotPublicKey)$' \
                -benchmem -benchtime=500ms -count=1 . >>"${output}/root-${kernel}.txt"
          }

          run_w5() {
            GOMAXPROCS=1 taskset -c 0 go test -tags='secp256k1_asm,secp256k1_amd64_w5_bench' -run '^$' \
              -bench '^Benchmark(ScalarBaseMultProjective|SignRecoverable|VerifyHotPublicKey)$' \
              -benchmem -benchtime=500ms -count=1 . >>"${output}/root-w5.txt"
          }

          for iteration in $(seq 1 10); do
            if (( iteration % 2 == 1 )); then
              run_mode default
              run_w5
              run_mode tagged
            else
              run_mode tagged
              run_w5
              run_mode default
            fi
            kernels=(none mul square)
            for offset in 0 1 2; do
              index=$(( (iteration + offset - 1) % 3 ))
              run_kernel "${kernels[index]}"
            done
          done
      - name: Capture tagged CPU profiles
        run: |
          set -euo pipefail
          output="${RUNNER_TEMP}/amd64-bench"
          capture_profile() {
            local benchmark="$1"
            GOMAXPROCS=1 taskset -c 0 go test -tags=secp256k1_asm -run '^$' \
                -bench "^Benchmark${benchmark}$" -benchtime=3s -count=1 \
                -cpuprofile="${output}/tagged-${benchmark}.cpu.pprof" . \
                >"${output}/tagged-${benchmark}.profile.txt"
          }
          capture_profile SignRecoverable
          capture_profile VerifyHotPublicKey
      - name: Build median reports
        run: |
          set -euo pipefail
          output="${RUNNER_TEMP}/amd64-bench"
          go run ./cmd/benchcmp "${output}/root-default.txt" "${output}/root-tagged.txt" \
            2>&1 | tee "${output}/root-summary.txt"
          go run ./cmd/benchcmp "${output}/field-default.txt" "${output}/field-tagged.txt" \
            2>&1 | tee "${output}/field-summary.txt"
          go run ./cmd/benchcmp "${output}/scalar-default.txt" "${output}/scalar-tagged.txt" \
            2>&1 | tee "${output}/scalar-summary.txt"
          go run ./cmd/benchcmp "${output}/root-w5.txt" "${output}/root-tagged.txt" \
            2>&1 | tee "${output}/root-w6-stage-summary.txt"
          for kernel in mul square; do
            go run ./cmd/benchcmp "${output}/root-none.txt" "${output}/root-${kernel}.txt" \
              2>&1 | tee "${output}/root-${kernel}-summary.txt"
          done
      - name: Check final end-to-end thresholds
        if: always()
        run: |
          output="${RUNNER_TEMP}/amd64-bench"
          go run ./cmd/benchcmp -gate=final-paired "${output}/root-default.txt" "${output}/root-tagged.txt"
      - name: Upload raw benchmark data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: amd64-${{ matrix.goamd64 }}-benchmarks
          path: ${{ runner.temp }}/amd64-bench
